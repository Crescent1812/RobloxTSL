site_name: "Roblox TSL Documentation"
site_description: "High‑performance MkDocs configuration"
site_url: "https://Crescent1822.github.io/RobloxTSL"
repo_name: Crescent1822/RobloxTSL
repo_url: https://github.com/Crescent1822/RobloxTSL

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.tabs.link
    - toc.integrate
  palette:
    - scheme: default
      primary: indigo
      accent: amber
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: Fira Code
  logo: assets/logo.svg
  favicon: assets/favicon.png

nav:
  - Home: index.md
  - Guides:
      - "Getting Started": guides/start.md
      - "Advanced Topics":
          - "Performance Tuning": guides/performance.md
          - "Custom Components": guides/components.md
  - API Reference:
      - "v1": api/v1.md
      - "v2": api/v2.md
  - About: about.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_png
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true
  - macros
  - awesome-pages
  - git-revision-date-localized:
      type: datetime
      fallback_to_build_date: true
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            docstring_style: google
  - redirects:
      redirect_maps:
        old-page.md: new-page.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourname
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/yourname

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/custom.js

watch:
  - overrides/
  - macros/