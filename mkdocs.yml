# ------------------------------------------------------------
# MkDocs – Full Configuration (Material + Plugins + Custom)
# ------------------------------------------------------------

site_name: "Roblox TypeScript Library (RobloxTSL)"
site_description: "Comprehensive documentation for My Project"
site_url: "https://Crescent1822.github.io/RobloxTSL/"

repo_name: "Crescent1822/RobloxTSL"
repo_url: "https://github.com/Crescent1822/RobloxTSL"
edit_uri: "edit/main/docs/"

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.tabs.link
    - toc.integrate
    - announce.dismiss
  palette:
    - scheme: default
      primary: indigo
      accent: amber
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: Fira Code
  logo: assets/logo.png
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Guides:
      - Overview: guides/overview.md
      - Installation: guides/install.md
      - Usage: guides/usage.md
  - API Reference:
      - Python: api/python.md
  - Changelog: changelog.md
  - About: about.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
  - attr_list

plugins:
  - search
  - awesome-pages
  - macros
  - git-revision-date-localized:
      type: datetime
      fallback_to_build_date: true
      timezone: UTC
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            docstring_style: google
            separate_signature: true
  - redirects:
      redirect_maps:
        old-page.md: new-page.md
        docs/old-guide.md: guides/overview.md
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: "https://github.com/<your-username>"
    - icon: fontawesome/brands/twitter
      link: "https://twitter.com/<your-handle>"
  copyright: "© <year> <your-name>"

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/custom.js

watch:
  - macros/
  - overrides/
  - assets/

exclude:
  - site-logs/*